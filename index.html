<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RH Tech - Willkommen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
        }
        
        h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #00d4aa, #00a8e8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .tagline {
            font-size: 1.5rem;
            color: #8892b0;
            margin-bottom: 40px;
        }
        
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .links {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        a {
            color: #00d4aa;
            text-decoration: none;
            padding: 12px 30px;
            border: 2px solid #00d4aa;
            border-radius: 30px;
            transition: all 0.3s;
        }
        
        a:hover {
            background: #00d4aa;
            color: #1a1a2e;
        }
        
        footer {
            margin-top: 60px;
            color: #8892b0;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>RH Tech</h1>
        <p class="tagline">Innovation trifft Technologie</p>
        
        <div class="card">
            <h2>🚀 Willkommen</h2>
            <p style="margin-top: 20px; line-height: 1.8; color: #ccd6f6;">
                Dies ist die Startseite von RH Tech. Hier entsteht etwas Großartiges!
            </p>
            
            <div class="links">
                <a href="#projekte">Projekte</a>
                <a href="#about">Über uns</a>
                <a href="#kontakt">Kontakt</a>
            </div>
        </div>
        
        <footer>
            © 2026 RH Tech. Alle Rechte vorbehalten.
        </footer>
    </div>
</body>
</html>
